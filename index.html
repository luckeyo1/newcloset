
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Virtual Closet</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <header>
        <h1><i class="fa-solid fa-door-open"></i> My Virtual Closet</h1>
        <p>Your digital wardrobe assistant</p>
    </header>

    <main>
        <section id="add-item-form-container">
            <h2>Add New Item</h2>
            <form id="add-item-form">
                <div class="form-group">
                    <label for="item-image">Image</label>
                    <input type="file" id="item-image" accept="image/*" required>
                </div>
                <div class="form-group">
                    <label for="item-name">Item Name</label>
                    <input type="text" id="item-name" placeholder="e.g., Blue Summer Dress" required>
                </div>
                <div class="form-group">
                    <label for="item-category">Category</label>
                    <select id="item-category" required>
                        <option value="">Select a category</option>
                        <option value="top">Top</option>
                        <option value="bottom">Bottom</option>
                        <option value="dress">Dress</option>
                        <option value="outerwear">Outerwear</option>
                        <option value="shoes">Shoes</option>
                        <option value="accessory">Accessory</option>
                    </select>
                </div>
                <button type="submit" class="glowing-btn">
                    <i class="fa-solid fa-plus"></i> Add to Closet
                </button>
            </form>
        </section>

        <section id="closet-gallery-container">
            <h2>My Collection</h2>
            <div id="closet-gallery">
                <!-- Closet items will be dynamically inserted here -->
            </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
