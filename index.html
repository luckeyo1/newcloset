<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Virtual Closet — Premium Wardrobe Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>
<body>

    <!-- Premium Navigation -->
    <nav>
        <div class="nav-logo">VIRTUAL<span>CLOSET</span></div>
        <div class="nav-links">
            <div id="user-info" style="font-size:12px; font-weight:700; color:var(--stone); text-transform:uppercase;"></div>
            <button id="auth-btn" class="btn-luxe">LOGIN</button>
            <button id="theme-toggle" style="background:none; border:none; cursor:pointer; font-size:18px; color:var(--charcoal);">
                <i class="fa-solid fa-circle-half-stroke"></i>
            </button>
        </div>
    </nav>

    <main class="app-container">
        <!-- Left: Management Area -->
        <section class="main-workspace">
            <div class="glass-card">
                <h2 class="serif panel-title">Archive New Item</h2>
                <p style="color:var(--stone); margin-bottom:30px; font-weight:300;">당신의 소중한 아이템을 디지털 데이터로 변환하여 관리하세요.</p>
                
                <div class="upload-zone" id="drop-zone">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <p style="font-weight:700;">Drag & Drop or Click to Upload</p>
                    <input type="file" id="item-image" accept="image/*" hidden>
                </div>

                <form id="add-item-form" style="margin-top:30px;">
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-bottom:20px;">
                        <input type="text" id="item-name" placeholder="Item Name" class="btn-luxe" style="background:#fff; color:#000; text-align:left; border:1px solid #eee;">
                        <select id="item-category" class="btn-luxe" style="background:#fff; color:#000; text-align:left; border:1px solid #eee;">
                            <option value="Top">상의 (Top)</option>
                            <option value="Bottom">하의 (Bottom)</option>
                            <option value="Outer">아우터 (Outer)</option>
                            <option value="Dress">원피스 (Dress)</option>
                            <option value="Shoes">신발 (Shoes)</option>
                            <option value="Acc">액세서리 (Acc)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-luxe" style="width:100%;">ADD TO COLLECTION</button>
                </form>
            </div>

            <!-- Gallery Grid -->
            <div class="gallery-header" style="margin-top:80px; display:flex; flex-direction:column; gap:20px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2 class="serif" style="font-size:32px;">My Collection</h2>
                    <p style="font-size:12px; color:var(--stone);"><span id="item-count">0</span> Items in Archive</p>
                </div>
                <div class="gallery-filters" id="category-filters" style="display:flex; gap:10px; flex-wrap:wrap;">
                    <span class="btn-luxe active" data-filter="전체" style="padding: 8px 20px; font-size: 11px; background: var(--charcoal); color: var(--cream);">ALL</span>
                    <span class="btn-luxe" data-filter="Top" style="padding: 8px 20px; font-size: 11px; background: #fff; color: #000; border: 1px solid #eee;">TOP</span>
                    <span class="btn-luxe" data-filter="Bottom" style="padding: 8px 20px; font-size: 11px; background: #fff; color: #000; border: 1px solid #eee;">BOTTOM</span>
                    <span class="btn-luxe" data-filter="Outer" style="padding: 8px 20px; font-size: 11px; background: #fff; color: #000; border: 1px solid #eee;">OUTER</span>
                    <span class="btn-luxe" data-filter="Dress" style="padding: 8px 20px; font-size: 11px; background: #fff; color: #000; border: 1px solid #eee;">DRESS</span>
                    <span class="btn-luxe" data-filter="Shoes" style="padding: 8px 20px; font-size: 11px; background: #fff; color: #000; border: 1px solid #eee;">SHOES</span>
                </div>
            </div>
            <div id="closet-gallery" class="closet-grid">
                <!-- Items will be injected here -->
            </div>
        </section>

        <!-- Right: Insight & Matching -->
        <aside class="side-panel">
            <div class="glass-card analysis-panel" id="ai-analysis-panel" style="position:sticky; top:100px;">
                <h3 class="serif" style="font-size:24px;">Style Insight</h3>
                <div id="analysis-content" class="analysis-content">
                    <p style="color:var(--stone); font-size:14px;">이미지를 업로드하면 AI가 실루엣과 카테고리를 분석합니다.</p>
                </div>
                
                <div id="smart-coord-container" style="margin-top:40px; padding-top:30px; border-top:1px solid var(--border-soft);">
                    <h4 class="serif" style="font-size:20px; margin-bottom:15px;">Smart Match</h4>
                    <div id="smart-coord-grid">
                        <p style="font-size:12px; color:var(--stone);">더 많은 아이템을 추가하여 AI 조합 제안을 활성화하세요.</p>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <!-- Auth Modal -->
    <div id="auth-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(10px); z-index:2000; align-items:center; justify-content:center;">
        <div class="glass-card" style="width:400px; padding:50px; position:relative;">
            <span class="close-modal" style="position:absolute; right:30px; top:20px; cursor:pointer; font-size:20px;">✕</span>
            <h2 class="serif" id="modal-title" style="font-size:32px; margin-bottom:10px;">Login</h2>
            <form id="auth-form" style="display:flex; flex-direction:column; gap:15px;">
                <input type="text" id="auth-id" placeholder="ID" class="btn-luxe" style="background:#fff; color:#000; text-align:left; border:1px solid #eee; width:100%;" required>
                <input type="password" id="auth-password" placeholder="Password" class="btn-luxe" style="background:#fff; color:#000; text-align:left; border:1px solid #eee; width:100%;" required>
                <button type="submit" id="auth-submit" class="btn-luxe">Sign In</button>
            </form>
            <p style="margin-top:20px; font-size:13px; text-align:center;">
                <a href="#" id="switch-to-signup" style="color:var(--blush); font-weight:700; text-decoration:none;">Create a secure account</a>
            </p>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="main.js"></script>
</body>
</html>
