
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Virtual Closet | AI Enhanced Wardrobe</title>
    <!-- TensorFlow.js for AI Categorization -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <!-- Pretendard Font for Trendy Korean UI -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <nav class="glass-nav">
        <div class="nav-container">
            <div class="logo">
                <i class="fa-solid fa- closet-rack"></i>
                <span>MY CLOSET</span>
            </div>
            <div class="nav-actions">
                <button id="theme-toggle" aria-label="테마 변경">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <header class="hero-section">
        <div class="hero-content">
            <h1>당신의 스타일을<br>정리하는 가장 완벽한 방법</h1>
            <p>나만의 옷장을 디지털로 관리하고 내일의 코디를 준비하세요.</p>
        </div>
    </header>

    <main class="container">
        <section id="add-item-section">
            <div class="section-header">
                <h2>새로운 아이템 추가</h2>
                <p>옷장에 넣을 옷의 사진과 정보를 입력해주세요.</p>
            </div>
            <div id="add-item-form-container">
                <form id="add-item-form">
                    <div class="upload-area" id="drop-zone">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <p>클릭하거나 이미지를 드래그하세요</p>
                        <input type="file" id="item-image" accept="image/*" required hidden>
                    </div>
                    <div class="input-grid">
                        <div class="form-group">
                            <label for="item-name">아이템 명칭</label>
                            <input type="text" id="item-name" placeholder="예: 블랙 오버핏 티셔츠" required>
                        </div>
                        <div class="form-group">
                            <label for="item-category">카테고리</label>
                            <select id="item-category" required>
                                <option value="">선택해주세요</option>
                                <option value="Top">상의</option>
                                <option value="Bottom">하의</option>
                                <option value="Outer">아우터</option>
                                <option value="Dress">원피스</option>
                                <option value="Shoes">신발</option>
                                <option value="Acc">액세서리</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="primary-btn">
                        옷장에 저장하기
                    </button>
                </form>
            </div>
        </section>

        <section id="closet-gallery-section">
            <div class="section-header">
                <h2>나의 컬렉션</h2>
                <div class="gallery-filters">
                    <span class="active">전체</span>
                    <span>상의</span>
                    <span>하의</span>
                    <span>아우터</span>
                </div>
            </div>
            <div id="closet-gallery">
                <!-- 아이템들이 여기에 정갈하게 표시됩니다 -->
            </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
